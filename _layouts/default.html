<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="{{ '/assets/favicon-v2.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/favicon.png' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">WOØF>0</span>F</div>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/signal-reports' | relative_url }}">Signal Reports</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/projects' | relative_url }}">Projects</a>
        <a href="{{ '/contact' | relative_url }}">Contact</a>
      </div>
    </nav>

    <header class="hero">
      <h1>{{ site.title }}</h1>
      <p>{{ site.description }}</p>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>© {{ site.time | date: "%Y" }} WO0F | Amateur Radio Station</p>
    </footer>
  </div>
</body>
</html>
