<!DOCTYPE html>
<html lang="en">
<<link rel="icon" href="{{ '/assets/favicon-v2.png' | relative_url }}" type="image/png">>
  <meta charset="UTF-8">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

<div class="container">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">WO0F</div>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/about' | relative_url }}">About</a>
      <a href="{{ '/projects' | relative_url }}">Projects</a>
      <a href="{{ '/contact' | relative_url }}">Contact</a>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="hero">
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
  </header>

  <!-- CONTENT -->
  <main>
    {{ content }}
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© {{ site.time | date: "%Y" }} WO0F | Amateur Radio Station</p>
  </footer>

</div>

</body>
</html>
