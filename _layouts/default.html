<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | WOØF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="{{ '/assets/favicon-v2.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/favicon-v2.png' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="{{ '/' | relative_url }}" class="logo">WOØF</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="https://www.qrz.com/db/WO0F" target="_blank" rel="noopener">My QRZ</a>
        <a href="https://pugetmesh.org" target="_blank" rel="noopener">PugetMesh</a>
        <a href="{{ '/projects' | relative_url }}">Projects</a>
        <a href="{{ '/signal-reports' | relative_url }}">Signal Reports</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/contact' | relative_url }}">Contact</a>
      </div>
    </nav>

    <header class="hero">
      <h1 class="hero-title">WOØF</h1>
      <p class="hero-subtitle">Amateur - GMRS - Mesh Radio</p>

      <div class="station-info">
        <div><strong>Location:</strong> Shoreline, WA</div>
        <div><strong>Bands:</strong> VHF / UHF / HF</div>
        <div><strong>Modes:</strong> FM, AM, SSB, Digital, Mesh</div>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>© {{ site.time | date: "%Y" }} WOØF | Amateur Radio Station</p>
      <div class="counter">
        <img src="https://visitor-badge.laobi.icu/badge?page_id=wo0f.wo0f.com" alt="Visitor counter">
      </div>
    </footer>
  </div>
</body>
</html>
